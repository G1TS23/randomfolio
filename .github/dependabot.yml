version: 2
updates:
  # Dépendances npm : correctifs de sécurité et mises à jour hebdomadaires
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Regroupe les mises à jour mineures/patch en une seule PR (moins de bruit)
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # TypeScript 7 (majeur) : @astrojs/check (peer typescript ^5||^6) et
      # @typescript-eslint (peer typescript <6.1) ne le supportent pas encore
      # → `npm ci` échoue. On reste en 6.x (mineures/patch OK). À retirer quand
      # l'outillage sera compatible TS 7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Actions GitHub utilisées par la CI
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
