name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule un run en cours si un nouveau commit arrive sur la même réf
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format (prettier --check)
        run: npm run format:check

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (astro check)
        run: npm run check

      - name: Build
        run: npm run build
