# Configuration de déploiement Netlify
# Site statique Astro : `astro build` génère dist/, servi tel quel.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Même version que la CI, pour un build identique
  NODE_VERSION = "22.12.0"

# Redirige l'ancienne URL Netlify vers le domaine principal (301).
# Le host est spécifié dans `from`, donc seule randomfolio.netlify.app est
# concernée — les requêtes vers olivier.falahi.org ne matchent pas (pas de boucle).
[[redirects]]
  from = "https://randomfolio.netlify.app/*"
  to = "https://olivier.falahi.org/:splat"
  status = 301
  force = true

# Cache long pour les assets fingerprintés générés par Astro (_astro/*)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# En-têtes de sécurité sur toutes les pages.
# CSP : les scripts du site sont tous `is:inline` (moteur de tirage, contrôles,
# REPL) → 'unsafe-inline' nécessaire ; styles inline + Google Fonts ; images et
# polices en data:/gstatic ; aucun appel réseau (connect 'self') ; pas d'iframe.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
